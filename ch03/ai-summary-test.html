<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文章摘要工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-section label {
            display: block;
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        #articleInput {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        #articleInput:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-container {
            text-align: center;
            margin: 30px 0;
        }
        
        #submitBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        #submitBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        #submitBtn:active {
            transform: translateY(0);
        }
        
        #submitBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        
        .result-section.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        .result-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        #summaryResult {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            line-height: 1.8;
            white-space: pre-wrap;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #c33;
            margin-top: 20px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI 文章摘要工具</h1>
            <p>輸入您的文章，讓 AI 幫您快速產生重點摘要</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <label for="articleInput">📝 請輸入文章內容：</label>
                <textarea 
                    id="articleInput" 
                    placeholder="在此貼上您的文章內容，AI 將自動為您摘要重點..."
                ></textarea>
            </div>
            
            <div class="button-container">
                <button id="submitBtn">✨ 生成摘要</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI 正在分析文章中，請稍候...</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            
            <div class="result-section" id="resultSection">
                <h2>📌 摘要結果</h2>
                <div id="summaryResult"></div>
            </div>
        </div>
    </div>

    <script>
        // 請將此處改為您的 n8n Webhook URL
        const WEBHOOK_URL = 'http://localhost:5678/webhook-test/ai-summary';
        
        const submitBtn = document.getElementById('submitBtn');
        const articleInput = document.getElementById('articleInput');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const summaryResult = document.getElementById('summaryResult');
        const errorMessage = document.getElementById('errorMessage');
        
        submitBtn.addEventListener('click', async () => {
            const article = articleInput.value.trim();
            
            // 驗證輸入
            if (!article) {
                showError('請輸入文章內容！');
                return;
            }
            
            if (article.length < 50) {
                showError('文章內容太短，請輸入至少 50 個字元！');
                return;
            }
            
            // 隱藏錯誤和結果
            hideError();
            resultSection.classList.remove('show');
            
            // 顯示載入中
            submitBtn.disabled = true;
            loading.classList.add('show');
            
            try {
                // 發送請求到 n8n Webhook
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        article: article
                    })
                });
                
                if (!response.ok) {
                    throw new Error('請求失敗，請檢查 Webhook URL 是否正確');
                }
                
                const data = await response.json();
                
                // 顯示結果
                if (data.success) {
                    summaryResult.textContent = data.summary;
                    resultSection.classList.add('show');
                } else {
                    throw new Error('摘要生成失敗');
                }
                
            } catch (error) {
                showError('錯誤：' + error.message);
            } finally {
                // 隱藏載入中
                loading.classList.remove('show');
                submitBtn.disabled = false;
            }
        });
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
        
        function hideError() {
            errorMessage.classList.remove('show');
        }
        
        // 按下 Enter 鍵不送出（避免誤觸）
        articleInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                submitBtn.click();
            }
        });
    </script>
</body>
</html>

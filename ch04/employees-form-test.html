<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>員工資料管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eef2f7;
            --surface: #ffffff;
            --surface2: #f7f9fc;
            --border: rgba(0,0,0,0.10);
            --accent-create: #0a8c5c;
            --accent-read: #1a5fbf;
            --accent-update: #b86b00;
            --accent-delete: #c0203a;
            --text: #1a2030;
            --text-muted: #5a6478;
            --input-bg: #f5f7fa;
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Noto Sans TC", sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(10,140,92,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(ellipse, rgba(26,95,191,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
            position: relative;
            animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-create), var(--accent-read));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        .header-text p {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
            margin-top: 2px;
        }

        /* Divider */
        .section-divider {
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Form fields */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .form-group.required label::after {
            content: ' *';
            color: var(--accent-delete);
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            padding: 11px 14px;
            font-size: 14px;
            font-family: "Noto Sans TC", sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: rgba(26,95,191,0.5);
            box-shadow: 0 0 0 3px rgba(26,95,191,0.10);
        }

        select option { background: #ffffff; color: #1a2030; }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Buttons */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 28px;
        }

        button {
            padding: 13px;
            border: none;
            border-radius: var(--radius);
            font-family: "Noto Sans TC", sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            transition: opacity 0.15s;
        }

        button:hover { transform: translateY(-1px); }
        button:hover::after { opacity: 0.06; }
        button:active { transform: translateY(0px) scale(0.98); }

        .btn-create {
            background: var(--accent-create);
            color: #ffffff;
            box-shadow: 0 3px 12px rgba(10,140,92,0.30);
        }
        .btn-read {
            background: var(--accent-read);
            color: #fff;
            box-shadow: 0 3px 12px rgba(26,95,191,0.30);
        }
        .btn-update {
            background: var(--accent-update);
            color: #fff;
            box-shadow: 0 3px 12px rgba(184,107,0,0.30);
        }
        .btn-delete {
            background: var(--accent-delete);
            color: #fff;
            box-shadow: 0 3px 12px rgba(192,32,58,0.30);
        }

        /* Message */
        #message {
            margin-top: 20px;
            padding: 13px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #message.success {
            display: flex;
            background: #e8f7f1;
            border: 1px solid rgba(10,140,92,0.35);
            color: var(--accent-create);
        }

        #message.error {
            display: flex;
            background: #fdeaed;
            border: 1px solid rgba(192,32,58,0.35);
            color: var(--accent-delete);
        }

        #message.info {
            display: flex;
            background: #e8eef9;
            border: 1px solid rgba(26,95,191,0.35);
            color: var(--accent-read);
        }

        /* Loading spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.15);
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="header-icon">📊</div>
        <div class="header-text">
            <h1>員工資料管理系統</h1>
            <p>CRUD · Employee Management</p>
        </div>
    </div>

    <div class="section-divider">員工資料</div>

    <form id="employeeForm" autocomplete="off">
        <div class="form-group required">
            <label>員工編號 (查詢 / 更新 / 刪除必填)</label>
            <input type="text" id="employeeId" placeholder="請輸入員工編號">
        </div>

        <div class="row">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="name" placeholder="請輸入姓名">
            </div>
            <div class="form-group">
                <label>薪資</label>
                <input type="number" id="salary" placeholder="請輸入薪資">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>部門</label>
                <select id="department">
                    <option value="技術部">技術部</option>
                    <option value="人資部">人資部</option>
                    <option value="財務部">財務部</option>
                    <option value="行銷部">行銷部</option>
                </select>
            </div>
            <div class="form-group">
                <label>狀態</label>
                <select id="status">
                    <option value="在職">在職</option>
                    <option value="離職">離職</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-create" onclick="handleAction('create')">
                ＋ 新增員工
            </button>
            <button type="button" class="btn-read" onclick="handleAction('read')">
                🔍 查詢資料
            </button>
            <button type="button" class="btn-update" onclick="handleAction('update')">
                ✏️ 更新資料
            </button>
            <button type="button" class="btn-delete" onclick="handleAction('delete')">
                🗑 刪除員工
            </button>
        </div>
    </form>

    <div id="message"></div>
</div>

<script>

async function handleAction(action) {
    const msgBox = document.getElementById('message');

    const payload = {
        action,
        "員工編號": document.getElementById('employeeId').value,
        "姓名":     document.getElementById('name').value,
        "部門":     document.getElementById('department').value,
        "薪資":     parseFloat(document.getElementById('salary').value) || 0,
        "狀態":     document.getElementById('status').value
    };

    // Show loading
    msgBox.className = 'info';
    msgBox.innerHTML = '<div class="spinner"></div> 連線中，請稍候…';
    msgBox.style.display = 'flex';

    let response;
    try {
        response = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
    } catch (networkErr) {
        // 真正的網路連線失敗（n8n 未啟動、網路中斷等）
        msgBox.className = 'error';
        msgBox.innerHTML = '✗ 連線失敗，請確認 Webhook URL 與 n8n 是否正常運作';
        return;
    }

    // 嘗試解析回傳 JSON（查無資料時 n8n 可能回空字串）
    let result = null;
    try {
        const text = await response.text();
        result = text ? JSON.parse(text) : null;
    } catch (parseErr) {
        result = null;
    }

    if (!response.ok) {
        // HTTP 4xx / 5xx — 可能是查無資料或 n8n 流程錯誤
        msgBox.className = 'error';
        msgBox.innerHTML = '⚠️ 連線正常，但查無資料或發生錯誤，請確認員工編號是否存在';
        return;
    }

    // HTTP 200，但內容為空 → 查無資料
    const data = result
        ? (Array.isArray(result) ? result[0] : (result.data || result))
        : null;

    const isEmpty = !data || Object.keys(data).length === 0
        || (!data["姓名"] && !data["部門"] && !data["薪資"]);

    if (action === 'read') {
        if (isEmpty) {
            msgBox.className = 'error';
            msgBox.innerHTML = `✗ 查無員工編號「${payload["員工編號"]}」的資料，請確認後再試`;
        } else {
            document.getElementById('name').value       = data["姓名"] || '';
            document.getElementById('department').value = data["部門"] || '技術部';
            document.getElementById('salary').value     = data["薪資"] || '';
            document.getElementById('status').value     = data["狀態"] || '在職';
            msgBox.className = 'info';
            msgBox.innerHTML = '🔍 資料已載入，您可以修改後點擊「更新資料」';
        }
    } else {
        // Create / Update / Delete
        clearFields();
        msgBox.className = 'success';
        const labels = { create:'新增', update:'更新', delete:'刪除' };
        msgBox.innerHTML = `✓ ${labels[action] || action}操作成功完成`;
    }
}

function clearFields() {
    // document.getElementById('employeeId').value = '';
    document.getElementById('name').value       = '';
    document.getElementById('salary').value     = '';
    document.getElementById('department').value = '技術部';
    document.getElementById('status').value     = '在職';
}
</script>
</body>
</html>

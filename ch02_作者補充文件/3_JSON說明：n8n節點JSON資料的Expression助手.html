<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n8n節點JSON資料的Expression助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #ff6d5a;
  --orange-dark: #e05545;
  --orange-glow: rgba(255,109,90,0.15);
  --bg: #0f0f13;
  --bg2: #16161d;
  --bg3: #1e1e28;
  --bg4: #252533;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e8f0;
  --text2: #9898b0;
  --text3: #5a5a72;
  --green: #6be99b;
  --blue: #60b8ff;
  --purple: #c084fc;
  --yellow: #fbbf24;
  --pink: #f472b6;
  --cyan: #22d3ee;
  --red: #f87171;
  --code-bg: #0a0a0f;
  --radius: 10px;
  --radius-lg: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 22px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  width: 36px; height: 36px;
  background: var(--orange);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

header h1 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}

header p {
  font-size: 13px;
  color: var(--text2);
  margin-left: auto;
}

/* ── Layout ── */
.main {
  display: grid;
  grid-template-columns: 380px 1fr;
  grid-template-rows: auto 1fr;
  gap: 0;
  height: calc(100vh - 65px);
}

/* ── Left Panel ── */
.left-panel {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.panel-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
}

.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--orange);
  color: white;
}

.badge.info { background: rgba(96,184,255,0.15); color: var(--blue); }

/* Mode toggle */
.mode-toggle {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
}

.toggle-row {
  display: flex;
  gap: 6px;
}

.mode-btn {
  flex: 1;
  padding: 7px 10px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: transparent;
  color: var(--text2);
  font-family: 'Sora', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.mode-btn:hover { border-color: var(--orange); color: var(--orange); }
.mode-btn.active {
  background: var(--orange-glow);
  border-color: var(--orange);
  color: var(--orange);
  font-weight: 600;
}

/* Textarea */
.input-area {
  padding: 12px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

textarea {
  flex: 1;
  width: 100%;
  padding: 12px 14px;
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: #d4d4e8;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  resize: none;
  outline: none;
  transition: border-color 0.15s;
}

textarea:focus { border-color: var(--orange); }

.parse-btn {
  width: 100%;
  padding: 10px;
  background: var(--orange);
  border: none;
  border-radius: var(--radius);
  color: white;
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.parse-btn:hover { background: var(--orange-dark); transform: translateY(-1px); }
.parse-btn:active { transform: translateY(0); }

/* Samples */
.samples {
  padding: 8px 16px 12px;
  display: flex; flex-wrap: wrap; gap: 6px;
  border-top: 1px solid var(--border);
}

.sample-label {
  width: 100%;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  padding: 4px 0 2px;
}

.sample-chip {
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--border2);
  border-radius: 20px;
  color: var(--text2);
  cursor: pointer;
  font-family: 'Sora', sans-serif;
  background: transparent;
  transition: all 0.15s;
}
.sample-chip:hover { border-color: var(--orange); color: var(--orange); }

/* ── Right Panel: JSON Viewer ── */
.right-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.viewer-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text3);
  background: var(--bg2);
  flex-shrink: 0;
}

.breadcrumb {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--orange);
  margin-left: auto;
}

#viewer {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.9;
}

#viewer::-webkit-scrollbar { width: 5px; }
#viewer::-webkit-scrollbar-track { background: transparent; }
#viewer::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

.json-tree ul {
  list-style: none;
  padding-left: 20px;
  border-left: 1px solid var(--border);
  margin: 0;
}

.json-tree > ul { padding-left: 0; border-left: none; }

.json-tree li {
  padding: 1px 0;
}

/* Array item header */
.array-item-header {
  color: var(--text3);
  font-size: 11px;
  padding: 4px 0 2px;
  border-top: 1px dashed var(--border);
  margin-top: 4px;
}
.array-item-header:first-child { border-top: none; margin-top: 0; }

/* Key */
.jk {
  color: var(--purple);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 5px;
  transition: all 0.12s;
  display: inline-block;
}
.jk:hover { background: rgba(192,132,252,0.12); color: #d8b4fe; }
.jk.active { background: rgba(255,109,90,0.15); color: var(--orange) !important; }

/* Values */
.jv-str { color: var(--green); }
.jv-num { color: var(--blue); }
.jv-bool { color: var(--yellow); }
.jv-null { color: var(--red); }
.jv-obj { color: var(--text3); font-size: 11px; }
.j-punct { color: var(--text3); }
.j-idx { color: var(--cyan); font-size: 11px; }

/* ── Result Bar ── */
.result-bar {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 12px;
  align-items: end;
  flex-shrink: 0;
}

.out-box {}
.out-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  margin-bottom: 6px;
}

.code-chip {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  min-height: 42px;
  display: flex;
  align-items: center;
  overflow-x: auto;
  white-space: nowrap;
  transition: border-color 0.2s;
}

.code-chip.expr { color: #fbbf24; }
.code-chip.preview { color: #6be99b; }
.code-chip.active { border-color: var(--orange); }

.copy-btn {
  padding: 10px 16px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: transparent;
  color: var(--text2);
  font-family: 'Sora', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  align-self: flex-end;
  height: 42px;
  display: flex; align-items: center; gap: 6px;
}
.copy-btn:hover { border-color: var(--orange); color: var(--orange); }
.copy-btn.copied { border-color: var(--green); color: var(--green); }

/* ── Suggestions Panel ── */
.suggestions {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  flex-shrink: 0;
}

.sug-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  margin-bottom: 8px;
}

.sug-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.sug-chip {
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--border2);
  border-radius: 20px;
  color: var(--text2);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  background: transparent;
  transition: all 0.15s;
}
.sug-chip:hover { border-color: var(--blue); color: var(--blue); background: rgba(96,184,255,0.07); }

/* ── Array Expressions Panel ── */
.array-panel {
  background: var(--bg3);
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  flex-shrink: 0;
  display: none;
}

.array-panel.visible { display: block; }

.array-panel-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}

.array-panel-title span { color: var(--cyan); }

.arr-expr-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
}

.arr-expr-item {
  background: var(--bg4);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.arr-expr-item:hover { border-color: var(--cyan); }

.arr-expr-name {
  font-size: 10px;
  color: var(--text3);
  font-weight: 600;
}

.arr-expr-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--cyan);
}

.arr-expr-desc {
  font-size: 10px;
  color: var(--text2);
}

/* ── Pulse animation for copy ── */
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,109,90,0.4); }
  100% { box-shadow: 0 0 0 8px rgba(255,109,90,0); }
}

.pulse { animation: pulse 0.4s ease-out; }

/* hint text */
.hint-text {
  color: var(--text3);
  font-size: 13px;
  font-family: 'Sora', sans-serif;
  padding: 40px 20px;
  text-align: center;
  line-height: 1.9;
}
.hint-text strong { color: var(--text2); }

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

/* item index badge */
.item-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--cyan);
  background: rgba(34,211,238,0.1);
  border: 1px solid rgba(34,211,238,0.2);
  border-radius: 20px;
  padding: 2px 8px;
  margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
}
</style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <h1>JSON說明：n8n 節點 JSON 資料的 Expression 助手</h1>
  <p>點擊 Key 名稱 → 自動產生 Expression</p>
</header>

<div class="main">

  <!-- Left -->
  <div class="left-panel">
    <div class="panel-header">
      <span class="panel-title">JSON 輸入</span>
    </div>

    <div class="mode-toggle">
      <div class="toggle-row">
        <button class="mode-btn active" id="btn-single" onclick="setMode('single')">
          ▪ 單筆 JSON
        </button>
        <button class="mode-btn" id="btn-array" onclick="setMode('array')">
          ▪ JSON 陣列
        </button>
        <button class="mode-btn" id="btn-n8n" onclick="setMode('n8n')">
          ⚡ n8n 格式
        </button>
      </div>
    </div>

    <div class="input-area">
      <textarea id="json-input" spellcheck="false" placeholder="貼上 JSON 內容..."></textarea>
      <button class="parse-btn" onclick="processJSON()">
        ▶ 解析資料
      </button>
    </div>

    <div class="samples">
      <div class="sample-label">載入範例</div>
      <button class="sample-chip" onclick="loadSample('single')">單筆物件</button>
      <button class="sample-chip" onclick="loadSample('array')">JSON 陣列</button>
      <button class="sample-chip" onclick="loadSample('n8n')">n8n 格式</button>
      <button class="sample-chip" onclick="loadSample('nested')">深層巢狀</button>
      <button class="sample-chip" onclick="loadSample('api')">API 回應</button>
    </div>
  </div>

  <!-- Right -->
  <div class="right-panel" id="right-panel">

    <div class="viewer-header">
      <span id="viewer-mode-badge">等待解析...</span>
      <span class="breadcrumb" id="breadcrumb"></span>
    </div>

    <div id="viewer"><div class="hint-text">
      貼上 JSON 後點擊「解析資料」<br>
      然後點擊右側任意 <strong>紫色 Key</strong> 即可產生 Expression
    </div></div>

    <!-- Array Expressions -->
    <div class="array-panel" id="array-panel">
      <div class="array-panel-title">
        📦 陣列常用 Expression — 右側 Key 是針對單筆資料，以下是整個陣列層級
        <span id="array-count-badge"></span>
      </div>
      <div class="arr-expr-grid" id="arr-expr-grid"></div>
    </div>

    <!-- Suggestions -->
    <div class="suggestions" id="suggestions" style="display:none">
      <div class="sug-title">🔧 延伸 Expression</div>
      <div class="sug-chips" id="sug-chips"></div>
    </div>

    <!-- Result Bar -->
    <div class="result-bar">
      <div class="out-box">
        <div class="out-label">n8n Expression</div>
        <div class="code-chip expr" id="expression-output">等待選擇...</div>
      </div>
      <div class="out-box">
        <div class="out-label">輸出值預覽</div>
        <div class="code-chip preview" id="data-preview">等待選擇...</div>
      </div>
      <button class="copy-btn" id="copy-btn" onclick="copyExpression()">
        ⎘ 複製
      </button>
    </div>

  </div>
</div>

<script>
let currentData = null;
let currentMode = 'single';
let currentPath = '';
let activeKeyEl = null;

// ── Mode ──
function setMode(m) {
  currentMode = m;
  ['single','array','n8n'].forEach(x => {
    document.getElementById('btn-'+x).classList.toggle('active', x===m);
  });
}

// ── Samples ──
const SAMPLES = {
  single: `{
  "id": 1001,
  "name": "王小明",
  "email": "ming@example.com",
  "active": true,
  "scores": [85, 92, 78],
  "address": {
    "city": "台北市",
    "zip": "10001"
  }
}`,
  array: `[
  { "id": 1, "name": "王小明", "email": "ming@example.com", "score": 85, "dept": "工程部" },
  { "id": 2, "name": "李美華", "email": "hua@example.com",  "score": 92, "dept": "行銷部" },
  { "id": 3, "name": "陳志遠", "email": "yuan@example.com", "score": 78, "dept": "工程部" }
]`,
  n8n: `[
  {
    "json": {
      "id": 1001,
      "name": "王小明",
      "email": "ming@example.com",
      "active": true,
      "scores": [85, 92, 78],
      "address": { "city": "台北市", "zip": "10001" }
    }
  }
]`,
  nested: `{
  "order": {
    "id": "ORD-2024-001",
    "status": "shipped",
    "customer": {
      "name": "王小明",
      "contact": {
        "email": "ming@example.com",
        "phone": "0912-345-678"
      }
    },
    "items": [
      { "sku": "A001", "qty": 2, "price": 150 },
      { "sku": "B002", "qty": 1, "price": 300 }
    ],
    "total": 600
  }
}`,
  api: `{
  "success": true,
  "data": {
    "users": [
      { "id": 1, "name": "Alice", "role": "admin" },
      { "id": 2, "name": "Bob",   "role": "user"  }
    ],
    "pagination": {
      "page": 1,
      "total": 2,
      "per_page": 10
    }
  },
  "message": "OK"
}`
};

function loadSample(name) {
  const sample = SAMPLES[name] || SAMPLES.single;
  document.getElementById('json-input').value = sample;
  if (name === 'array') setMode('array');
  else if (name === 'n8n') setMode('n8n');
  else setMode('single');
  processJSON();
}

// ── Parse ──
function processJSON() {
  const input = document.getElementById('json-input').value.trim();
  const viewer = document.getElementById('viewer');
  if (!input) return;

  let parsed;
  try {
    parsed = JSON.parse(input);
  } catch(e) {
    viewer.innerHTML = `<div class="hint-text" style="color:var(--red)">JSON 格式錯誤，請檢查內容。<br><small style="font-family:monospace;font-size:11px">${e.message}</small></div>`;
    return;
  }

  viewer.innerHTML = '';
  document.getElementById('array-panel').classList.remove('visible');
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('breadcrumb').textContent = '';

  // Detect structure
  const isN8nFmt = Array.isArray(parsed) && parsed.length > 0 && parsed[0] && parsed[0].json;
  const isArray = Array.isArray(parsed);
  const isMixed = isArray && !isN8nFmt;

  let rootData, rootPrefix, displayMode;

  if (isN8nFmt) {
    rootData = parsed[0].json;
    rootPrefix = '$json';
    displayMode = '⚡ n8n 格式 — $json 指向 json 欄位';
    currentMode = 'n8n';
    setMode('n8n');
  } else if (isMixed) {
    rootData = parsed;
    rootPrefix = '$json';
    displayMode = `📦 JSON 陣列 — ${parsed.length} 筆資料`;
    currentMode = 'array';
    setMode('array');
  } else {
    rootData = parsed;
    rootPrefix = '$json';
    displayMode = '▪ 單筆 JSON 物件';
    currentMode = 'single';
    setMode('single');
  }

  currentData = rootData;
  document.getElementById('viewer-mode-badge').textContent = displayMode;

  if (isMixed) {
    // Render array items
    renderArrayView(parsed, viewer, rootPrefix);
    buildArrayExpressions(parsed, rootPrefix);
  } else {
    // Render object
    const tree = document.createElement('div');
    tree.className = 'json-tree';
    tree.appendChild(renderJSON(rootData, rootPrefix));
    viewer.appendChild(tree);
  }
}

// ── Render single object ──
function renderJSON(obj, path) {
  const ul = document.createElement('ul');

  for (let key in obj) {
    const li = document.createElement('li');
    const val = obj[key];
    const isIdx = !isNaN(key);
    const currentPath = isIdx ? `${path}[${key}]` : `${path}["${key}"]`;

    const keySpan = document.createElement('span');
    keySpan.className = 'jk';
    keySpan.dataset.path = currentPath;
    keySpan.dataset.val = JSON.stringify(val);
    keySpan.textContent = isIdx ? `[${key}]` : `"${key}"`;
    keySpan.onclick = (e) => {
      e.stopPropagation();
      selectKey(keySpan, currentPath, val);
    };

    li.appendChild(keySpan);
    li.appendChild(mkText(': '));

    if (typeof val === 'object' && val !== null) {
      const isArr = Array.isArray(val);
      li.appendChild(mkText(isArr ? '[' : '{'));
      li.appendChild(renderJSON(val, currentPath));
      const summary = isArr
        ? `] <span class="j-idx">(${val.length} items)</span>`
        : '}';
      li.insertAdjacentHTML('beforeend', summary);
    } else {
      const vs = document.createElement('span');
      vs.className = getValClass(val);
      vs.textContent = formatVal(val);
      li.appendChild(vs);
    }
    ul.appendChild(li);
  }
  return ul;
}

// ── Render array view ──
function renderArrayView(arr, container, prefix) {
  const tree = document.createElement('div');
  tree.className = 'json-tree';

  arr.forEach((item, idx) => {
    const badge = document.createElement('div');
    badge.className = 'item-badge';
    badge.textContent = `$input.all()[${idx}].json  —  item ${idx+1} / ${arr.length}`;
    tree.appendChild(badge);

    const itemPath = `$json`; // within each item context
    const ul = renderJSON(item, itemPath);
    tree.appendChild(ul);
  });

  container.appendChild(tree);
}

// ── Build array-level expressions ──
function buildArrayExpressions(arr, prefix) {
  const panel = document.getElementById('array-panel');
  const grid = document.getElementById('arr-expr-grid');
  panel.classList.add('visible');
  grid.innerHTML = '';

  document.getElementById('array-count-badge').textContent = `${arr.length} 筆`;

  // Gather all top-level string/number keys
  const numericKeys = [];
  const allKeys = arr.length > 0 ? Object.keys(arr[0]) : [];
  allKeys.forEach(k => {
    if (typeof arr[0][k] === 'number' || typeof arr[0][k] === 'string') {
      numericKeys.push(k);
    }
  });

  const exprs = [
    {
      name: '陣列總長度',
      code: `{{ $input.all().length }}`,
      desc: '取得此節點輸出的資料筆數',
      val: arr.length
    },
    {
      name: '取第 1 筆資料',
      code: `{{ $input.first().json }}`,
      desc: '取整個陣列的第一筆',
      val: JSON.stringify(arr[0])
    },
    {
      name: '取最後一筆資料',
      code: `{{ $input.last().json }}`,
      desc: '取整個陣列的最後一筆',
      val: JSON.stringify(arr[arr.length-1])
    },
    {
      name: '依索引取第 N 筆',
      code: `{{ $input.all()[0].json }}`,
      desc: '修改 [0] 為你要的索引值',
      val: JSON.stringify(arr[0])
    },
    {
      name: '取當前處理中的索引',
      code: `{{ $itemIndex }}`,
      desc: '在 loop 中，目前處理到第幾筆（從 0 起）',
      val: '0, 1, 2...'
    },
    {
      name: '轉換為 JS 陣列操作',
      code: `{{ $input.all().map(i => i.json) }}`,
      desc: '取得純 JSON 物件陣列，方便 .filter / .find',
      val: JSON.stringify(arr.slice(0,2)) + '...'
    },
  ];

  if (numericKeys.length > 0) {
    const k = numericKeys[0];
    exprs.push({
      name: `計算 ${k} 的總和`,
      code: `{{ $input.all().reduce((s,i) => s + i.json["${k}"], 0) }}`,
      desc: `將所有資料的 "${k}" 加總`,
      val: arr.reduce((s,i) => s + (typeof i[k]==='number' ? i[k] : 0), 0)
    });
    exprs.push({
      name: `取 ${k} 最大值`,
      code: `{{ Math.max(...$input.all().map(i => i.json["${k}"])) }}`,
      desc: `所有資料中 "${k}" 最大值`,
      val: Math.max(...arr.map(i => typeof i[k]==='number' ? i[k] : -Infinity))
    });
    exprs.push({
      name: `取 ${k} 最小值`,
      code: `{{ Math.min(...$input.all().map(i => i.json["${k}"])) }}`,
      desc: `所有資料中 "${k}" 最小值`,
      val: Math.min(...arr.map(i => typeof i[k]==='number' ? i[k] : Infinity))
    });
    exprs.push({
      name: `計算 ${k} 平均值`,
      code: `{{ ($input.all().reduce((s,i) => s + i.json["${k}"], 0) / $input.all().length).toFixed(2) }}`,
      desc: `所有資料的 "${k}" 平均值`,
      val: (arr.reduce((s,i) => s + (typeof i[k]==='number' ? i[k] : 0), 0) / arr.length).toFixed(2)
    });
  }

  if (allKeys.length > 0) {
    const k = allKeys[0];
    exprs.push({
      name: `篩選特定條件`,
      code: `{{ $input.all().filter(i => i.json["${k}"] === "值") }}`,
      desc: `只保留 "${k}" 等於指定值的資料`,
      val: '過濾後的陣列'
    });
    exprs.push({
      name: `提取單一欄位為陣列`,
      code: `{{ $input.all().map(i => i.json["${k}"]) }}`,
      desc: `把所有資料的 "${k}" 值收集成新陣列`,
      val: JSON.stringify(arr.slice(0,3).map(i => i[k]))
    });
    exprs.push({
      name: `去重複值`,
      code: `{{ [...new Set($input.all().map(i => i.json["${k}"]))] }}`,
      desc: `"${k}" 的唯一值列表（去掉重複）`,
      val: JSON.stringify([...new Set(arr.map(i => i[k]))])
    });
  }

  exprs.push({
    name: '轉成 JSON 字串',
    code: `{{ JSON.stringify($input.all().map(i => i.json)) }}`,
    desc: '將陣列轉為 JSON 字串，方便傳給 HTTP Request',
    val: '[...]'
  });

  exprs.forEach(e => {
    const el = document.createElement('div');
    el.className = 'arr-expr-item';
    el.innerHTML = `
      <div class="arr-expr-name">${e.name}</div>
      <div class="arr-expr-code">${escHtml(e.code)}</div>
      <div class="arr-expr-desc">${e.desc} → <span style="color:var(--green)">${escHtml(String(e.val).slice(0,50))}</span></div>
    `;
    el.onclick = () => {
      document.getElementById('expression-output').textContent = e.code;
      document.getElementById('data-preview').textContent = String(e.val).slice(0, 120);
      document.getElementById('expression-output').classList.add('active');
      document.getElementById('data-preview').classList.add('active');
      document.getElementById('breadcrumb').textContent = e.name;
    };
    grid.appendChild(el);
  });
}

// ── Select key ──
function selectKey(el, path, val) {
  if (activeKeyEl) activeKeyEl.classList.remove('active');
  activeKeyEl = el;
  el.classList.add('active');

  const expr = `{{ ${path} }}`;
  const preview = (typeof val === 'object' && val !== null)
    ? JSON.stringify(val, null, 2)
    : String(val);

  const exprEl = document.getElementById('expression-output');
  const previewEl = document.getElementById('data-preview');
  exprEl.textContent = expr;
  previewEl.textContent = preview.slice(0, 200) + (preview.length > 200 ? '...' : '');
  exprEl.classList.add('active');
  previewEl.classList.add('active');

  document.getElementById('breadcrumb').textContent = path;

  buildSuggestions(path, val);
}

// ── Build suggestions ──
function buildSuggestions(path, val) {
  const el = document.getElementById('suggestions');
  const chips = document.getElementById('sug-chips');
  chips.innerHTML = '';

  const sugs = [];

  if (typeof val === 'string') {
    sugs.push({ label: `大寫`, code: `{{ ${path}.toUpperCase() }}` });
    sugs.push({ label: `小寫`, code: `{{ ${path}.toLowerCase() }}` });
    sugs.push({ label: `去空白`, code: `{{ ${path}.trim() }}` });
    sugs.push({ label: `長度`, code: `{{ ${path}.length }}` });
    sugs.push({ label: `包含判斷`, code: `{{ ${path}.includes("關鍵字") }}` });
    sugs.push({ label: `起始判斷`, code: `{{ ${path}.startsWith("前綴") }}` });
  }

  if (typeof val === 'number') {
    sugs.push({ label: `加 10`, code: `{{ ${path} + 10 }}` });
    sugs.push({ label: `格式化`, code: `{{ ${path}.toFixed(2) }}` });
    sugs.push({ label: `大於 0 判斷`, code: `{{ ${path} > 0 }}` });
    sugs.push({ label: `千分位`, code: `{{ ${path}.toLocaleString() }}` });
  }

  if (typeof val === 'boolean') {
    sugs.push({ label: `反轉`, code: `{{ !${path} }}` });
    sugs.push({ label: `條件文字`, code: `{{ ${path} ? "是" : "否" }}` });
  }

  if (Array.isArray(val)) {
    sugs.push({ label: `長度`, code: `{{ ${path}.length }}` });
    sugs.push({ label: `第 1 筆`, code: `{{ ${path}[0] }}` });
    sugs.push({ label: `最後 1 筆`, code: `{{ ${path}.last() }}` });
    sugs.push({ label: `總和`, code: `{{ ${path}.sum() }}` });
    sugs.push({ label: `最大值`, code: `{{ Math.max(...${path}) }}` });
    sugs.push({ label: `最小值`, code: `{{ Math.min(...${path}) }}` });
    sugs.push({ label: `平均值`, code: `{{ (${path}.sum() / ${path}.length).toFixed(2) }}` });
    sugs.push({ label: `排序`, code: `{{ ${path}.sort((a,b) => a-b) }}` });
    sugs.push({ label: `含判斷`, code: `{{ ${path}.includes(值) }}` });
    sugs.push({ label: `轉字串`, code: `{{ ${path}.join(", ") }}` });
  }

  if (typeof val === 'object' && val !== null && !Array.isArray(val)) {
    sugs.push({ label: `JSON 字串`, code: `{{ JSON.stringify(${path}) }}` });
    sugs.push({ label: `所有 Keys`, code: `{{ Object.keys(${path}) }}` });
  }

  // common
  sugs.push({ label: `不為空判斷`, code: `{{ ${path} != null && ${path} !== "" }}` });

  if (sugs.length === 0) {
    el.style.display = 'none';
    return;
  }

  sugs.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sug-chip';
    btn.textContent = s.label;
    btn.onclick = () => {
      document.getElementById('expression-output').textContent = `{{ ${s.code.replace(/\{\{ | \}\}/g,'')} }}`;
      document.getElementById('data-preview').textContent = '（點擊複製使用）';
      document.getElementById('breadcrumb').textContent = s.code.replace(/\{\{ | \}\}/g,'');
    };
    chips.appendChild(btn);
  });

  el.style.display = 'block';
}

// ── Copy ──
function copyExpression() {
  const text = document.getElementById('expression-output').textContent;
  if (!text.startsWith('{{')) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ 已複製';
    btn.classList.add('copied');
    btn.classList.add('pulse');
    setTimeout(() => {
      btn.textContent = '⎘ 複製';
      btn.classList.remove('copied');
      btn.classList.remove('pulse');
    }, 2000);
  });
}

// ── Helpers ──
function mkText(t) { return document.createTextNode(t); }

function getValClass(v) {
  if (v === null) return 'jv-null';
  if (typeof v === 'string') return 'jv-str';
  if (typeof v === 'number') return 'jv-num';
  if (typeof v === 'boolean') return 'jv-bool';
  return '';
}

function formatVal(v) {
  if (v === null) return 'null';
  if (typeof v === 'string') return `"${v}"`;
  return String(v);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.onload = () => loadSample('n8n');
